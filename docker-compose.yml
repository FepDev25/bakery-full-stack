services:

  # Base de datos
  postgres:
    image: postgres:16-alpine
    container_name: panaderia_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: panaderia_user
      POSTGRES_PASSWORD: panaderia_pass
      POSTGRES_DB: panaderia_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./panaderia_db/database/00_init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./panaderia_db/database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panaderia_user -d panaderia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API
  api:
    build:
      context: ./panaderia_api
      dockerfile: Dockerfile
    container_name: panaderia_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Carga variables del .env raíz
    env_file:
      - .env
    environment:
      # Dentro de la red Docker, el host de la BD es el nombre del servicio.
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # pgAdmin
  # Disponible solo con: docker compose --profile tools up
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: panaderia_pgadmin
    profiles: [tools]
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@panaderia.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
